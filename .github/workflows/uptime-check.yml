name: Uptime Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check new.tallstak.com for "campaigns"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          alert() {
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🚨 *Uptime alert*: $1\"}"
          }
          if ! body=$(curl -sf --max-time 15 https://new.tallstak.com); then
            echo "❌ Failed to reach new.tallstak.com – sending Slack alert"
            alert "Could not reach https://new.tallstak.com"
            exit 1
          fi
          if echo "$body" | grep -qi "campaigns"; then
            echo "✅ 'campaigns' found on new.tallstak.com"
          else
            echo "❌ 'campaigns' NOT found – sending Slack alert"
            alert "The word *campaigns* was not found on https://new.tallstak.com"
            exit 1
          fi
